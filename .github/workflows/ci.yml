name: CI

on:
  workflow_dispatch:
    inputs:
      runtime:
        description: "Windows runtime identifier"
        required: true
        default: "win-x64"
        type: choice
        options:
          - win-x64
          - win-arm64
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration ${{ matrix.configuration }}

      - name: Test
        run: dotnet test --no-build --configuration ${{ matrix.configuration }} --verbosity normal

  publish:
    runs-on: windows-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    env:
      CONFIGURATION: Release
      RUNTIME: ${{ github.event.inputs.runtime || 'win-x64' }}
      PUBLISH_DIR: artifacts/publish/cmux-windows

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore publish runtime
        run: dotnet restore Cmux.sln --runtime $env:RUNTIME

      - name: Publish WPF App
        run: >
          dotnet publish src/Cmux/Cmux.csproj
          --configuration $env:CONFIGURATION
          --runtime $env:RUNTIME
          --self-contained true
          --no-restore
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false
          --output $env:PUBLISH_DIR

      - name: Publish CLI
        run: >
          dotnet publish src/Cmux.Cli/Cmux.Cli.csproj
          --configuration $env:CONFIGURATION
          --runtime $env:RUNTIME
          --self-contained true
          --no-restore
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false
          --output $env:PUBLISH_DIR

      - name: Publish daemon
        run: >
          dotnet publish src/Cmux.Daemon/Cmux.Daemon.csproj
          --configuration $env:CONFIGURATION
          --runtime $env:RUNTIME
          --self-contained true
          --no-restore
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false
          --output $env:PUBLISH_DIR

      - name: Create zip package
        id: package
        shell: pwsh
        run: |
          $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" -replace '^v', '' } else { "run-${{ github.run_number }}" }
          $packageName = "cmux-windows-$version-$env:RUNTIME"
          $zipPath = Join-Path "artifacts" "$packageName.zip"

          New-Item -ItemType Directory -Force -Path "artifacts" | Out-Null
          Compress-Archive -Path "$env:PUBLISH_DIR/*" -DestinationPath $zipPath -Force

          "package-name=$packageName" >> $env:GITHUB_OUTPUT
          "package-path=$zipPath" >> $env:GITHUB_OUTPUT

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.package-name }}
          path: ${{ steps.package.outputs.package-path }}
          if-no-files-found: error

      - name: Attach package to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.package-path }}
